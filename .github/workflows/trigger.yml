name: Trigger Daily Reports

on:
  schedule:
    - cron: '3 7 * * 1-5'   # A-Share close (07:03 UTC = 15:03 Beijing)
    - cron: '3 20 * * 1-5'  # US close EDT (20:03 UTC = 16:03 EDT)
    - cron: '3 21 * * 1-5'  # US close EST (21:03 UTC = 16:03 EST)

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Dispatch A-Share report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/A-Share-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "A-Share dispatch sent."

      - name: Dispatch US-Equity report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/US-Equity-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "US-Equity dispatch sent."
