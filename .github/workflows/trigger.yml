name: Trigger Daily Reports

on:
  schedule:
    # A-Share window: 07:00 UTC (15:00 Beijing)
    - cron: '3 7 * * 1-5'
    - cron: '13 7 * * 1-5'
    - cron: '23 7 * * 1-5'
    - cron: '33 7 * * 1-5'
    # US window EDT: 20:00 UTC (16:00 EDT)
    - cron: '3 20 * * 1-5'
    - cron: '13 20 * * 1-5'
    - cron: '23 20 * * 1-5'
    # US window EST: 21:00 UTC (16:00 EST)
    - cron: '3 21 * * 1-5'
    - cron: '13 21 * * 1-5'
    - cron: '23 21 * * 1-5'

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Dispatch A-Share report (06:00–12:00 UTC window)
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 6 ] && [ "$HOUR" -lt 12 ]; then
            curl -s -X POST \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/zhoujinjia-gif/A-Share-report/dispatches \
              -d '{"event_type":"send_report"}'
            echo "A-Share dispatch sent (HOUR=$HOUR)."
          else
            echo "Outside A-Share window (HOUR=$HOUR). Skipping."
          fi

      - name: Dispatch US-Equity report (19:00–02:00 UTC window)
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -ge 19 ] || [ "$HOUR" -lt 2 ]; then
            curl -s -X POST \
              -H "Authorization: token $PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/zhoujinjia-gif/US-Equity-report/dispatches \
              -d '{"event_type":"send_report"}'
            echo "US-Equity dispatch sent (HOUR=$HOUR)."
          else
            echo "Outside US window (HOUR=$HOUR). Skipping."
          fi
