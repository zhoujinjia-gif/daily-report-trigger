name: Trigger Daily Reports

on:
  schedule:
    # A-Share: 07:00 UTC = 15:00 Beijing
    - cron: '0 7 * * 1-5'
    # US Equity EDT: 20:00 UTC = 16:00 EDT
    - cron: '0 20 * * 1-5'
    # US Equity EST: 21:00 UTC = 16:00 EST
    - cron: '0 21 * * 1-5'

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger A-Share report (07:00 UTC only)
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" != "07" ]; then
            echo "Skipping A-Share — only triggers at 07:00 UTC"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/A-Share-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "A-Share trigger sent."

      - name: Trigger US-Equity report (20:00 EDT / 21:00 EST)
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          HOUR=$(date -u +%H)
          # DST detection: EDT = UTC-4 (-0400), EST = UTC-5 (-0500)
          OFFSET=$(TZ=America/New_York date +%z)
          if [ "$OFFSET" = "-0400" ]; then
            TARGET=20  # EDT: market closes 16:00 EDT = 20:00 UTC
          else
            TARGET=21  # EST: market closes 16:00 EST = 21:00 UTC
          fi
          if [ "$HOUR" != "$TARGET" ]; then
            echo "Skipping US-Equity — DST offset=$OFFSET, target hour=$TARGET, current hour=$HOUR"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/US-Equity-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "US-Equity trigger sent (DST offset=$OFFSET)."
