name: Trigger Daily Reports

on:
  schedule:
    # A-Share: 07:00 UTC = 15:00 Beijing (market closes 15:00)
    - cron: '0 7 * * 1-5'
    # US Equity EDT: 20:00 UTC = 16:00 EDT (market closes 16:00)
    - cron: '0 20 * * 1-5'
    # US Equity EST: 21:00 UTC = 16:00 EST (market closes 16:00)
    - cron: '0 21 * * 1-5'

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger A-Share report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/A-Share-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "A-Share trigger sent."

      - name: Trigger US-Equity report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/US-Equity-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "US-Equity trigger sent."
