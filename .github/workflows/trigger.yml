name: Trigger Daily Reports

on:
  schedule:
    # A-Share window: 07:00 UTC (15:00 Beijing)
    - cron: '3 7 * * 1-5'
    - cron: '13 7 * * 1-5'
    - cron: '23 7 * * 1-5'
    - cron: '33 7 * * 1-5'
    # US window EDT: 20:00 UTC (16:00 EDT)
    - cron: '3 20 * * 1-5'
    - cron: '13 20 * * 1-5'
    - cron: '23 20 * * 1-5'
    # US window EST: 21:00 UTC (16:00 EST)
    - cron: '3 21 * * 1-5'
    - cron: '13 21 * * 1-5'
    - cron: '23 21 * * 1-5'

  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Dispatch A-Share report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/A-Share-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "A-Share dispatch sent."

      - name: Dispatch US-Equity report
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zhoujinjia-gif/US-Equity-report/dispatches \
            -d '{"event_type":"send_report"}'
          echo "US-Equity dispatch sent."
